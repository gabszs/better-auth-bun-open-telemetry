version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: otel-bun-postgres
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    # volumes:
    #   - postgres_data1:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: otel-bun-redis
    ports:
      - "6379:6379"

